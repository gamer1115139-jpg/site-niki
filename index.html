<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Royal Estates</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
  <h1>ROYAL ESTATES</h1>

  <button id="themeBtn" onclick="toggleTheme()">
    <span class="icon"></span>
  </button>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h2>Luxury Redefined</h2>
    <p>خانه‌های لوکس برای افراد خاص</p>

    <div class="search-box">
      <input type="text" placeholder="جستجو ملک...">
      <button>جستجو</button>
    </div>
  </div>
</section>

<!-- Properties -->
<section class="properties">

  <div class="card">
    <img src="https://source.unsplash.com/800x600/?luxury-house">
    <h3>ویلا لوکس</h3>
    <p>دبی · 5 خواب · $5M</p>
    <button>مشاهده</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/800x600/?mansion">
    <h3>عمارت مدرن</h3>
    <p>دبی · 6 خواب · $8M</p>
    <button>مشاهده</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/800x600/?villa">
    <h3>ملک خصوصی</h3>
    <p>دبی · 7 خواب · $12M</p>
    <button>مشاهده</button>
  </div>

</section>

<!-- CTA -->
<section class="cta">
  <h2>تماس برای خرید</h2>
  <a href="tel:+989111480159">تماس مستقیم</a>
</section>

  <script src="script.js"></script>
  
</body>
</html>
